<!DOCTYPE html>
<html lang = "en">
<head>
    <title>Task Tracker</title>
    <link rel="stylesheet" href="CSS/darkblue.css" id="css_thing">
    <link rel = "icon" type="image/x-icon" href="./Assets/smiley.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body> 
    <!-- onbeforeunload = "return check();" -->
    <h2 style = "text-align: center;">knock-off google docs for saving stuff</h2>
    <div id="menu" class = "idk">
        <div style = "margin:3%">
            <br>
            <h2>Select A Page To Begin!</h2>
            <div id = "buttons"></div>
            <br>
        </div>
    </div>
    <div class = "idk" hidden = true id = "main">
        <div style = "margin:3%;">
            <br><br>
            <div>
                <button id="back" onclick="shift(-1);" style = "width: 50px;"><</button>
                <button id="menu" onclick="if(check()){showMenu();}">Open Menu</button>
                <button id="forward" onclick="shift(1);" style = "width: 50px;">></button>
            </div>
            <p id = "header" style = "border-style: none;">Page: 1</p>
            <div>
                <h2 id = "title" contenteditable="true" class = "main_input"></h2>
                <p contenteditable="true" id = "displaybox" class = "main_input">type here!</p>
            </div>
            <button id="save" onclick="save();">Save page</button>
            <div>
                <button onclick = "addList()" class = "util_button">Add List</button>
                <button onclick = "cssChange()" class = "util_button">Change CSS</button>
                <button id = "reset" onclick="resetPage();" class = "important_button util_button">Reset page</button> 
                <br>
            </div>
            <a href = "settings.html">Settings (Test)</a>
            <p style = "font-size: 100%; border-style: none;" id = "savemsg"></p>
            <script src = "tasksaver.js"></script>
            <br><br>
        </div>
        <footer style = "text-align: center; position: fixed;">
            Colors powered by <b>why not</b></footer>
    </div>
    <div></div>
</body>
</html>
